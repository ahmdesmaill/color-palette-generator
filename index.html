<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Color Scheme Generator ✨</title>
        <link rel="stylesheet" href="./styles.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,100..900&display=swap" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js" defer></script>
        <script type="module" src="./main.js" defer></script>
    </head>
    <body>
        <main>
            <form id="get-colors-form">
                <label for="color-picker" class="sr-only">Pick a color</label>
                <input type="color" name="color" id="color-picker" value="#F55A5A">
                <label for="scheme-mode" class="sr-only">Scheme mode</label>
                <select name="scheme-mode" id="scheme-mode">
                    <option value="monochrome" selected>Monochrome</option>
                    <option value="monochrome-dark">Monochrome Dark</option>
                    <option value="monochrome-light">Monochrome Light</option>
                    <option value="analogic">Analogic</option>
                    <option value="complement">Complement</option>
                    <option value="analogic-complement">Analogic Complement</option>
                    <option value="triad">Triad</option>
                    <option value="quad">Quad</option>
                </select>
                <button type="submit">Get color scheme</button>
            </form>
            <div id="colors" aria-live="polite" aria-label="Color palette"></div>
        </main>
        <div id="hover-box"><span>Click to copy</span></div>
    </body>
</html>
