<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Color Scheme Generator ✨</title>
        <link rel="stylesheet" href="./styles.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,100..900&display=swap" rel="stylesheet">
    </head>
    <body>
        <main>
            <form>
                <label for="colorPicker" class="sr-only">Pick a color</label>
                <input type="color" id="colorPicker" value="#F55A5A">
                <label for="schemeType" class="sr-only">Scheme type</label>
                <select id="schemeType">
                    <option selected>Monochrome</option>
                    <option>Monochrome Dark</option>
                    <option>Monochrome Light</option>
                    <option>Analogic</option>
                    <option>Complement</option>
                    <option>Analogic Complement</option>
                    <option>Triad</option>
                    <option>Quad</option>
                </select>
                <button type="submit">Get color scheme</button>
            </form>
            <div id="colors">
                <div class="color">
                    <div></div>
                    <p>#F55A5A</p>
                </div>
            </div>
        </main>
    </body>
</html>
